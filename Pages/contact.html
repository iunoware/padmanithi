<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <!-- font 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="../Styles/contact.css" />
    <!-- calender -->
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
      rel="stylesheet"
    />
    <title>Contact</title>
  </head>
  <body>
    <!-- nav bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light" style="height: 50px">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold fs-3" href="#">Iunoware</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
          <div class="navbar-nav fs-5">
            <a class="nav-link px-4" aria-current="page" href="../index.html">Home</a>
            <a class="nav-link px-4" href="./about.html">About</a>
            <a class="nav-link px-4" href="#">Service</a>
            <a class="nav-link active px-4" href="./contact.html">Contact</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- hero section -->
    <div class="hero-section">
      <div class="img-container">
        <h1 class="text-white hero-text">Contact Us</h1>
      </div>
    </div>

    <!-- form section -->
    <div class="container">
      <h2 class="mt-5">Fast contact</h2>
      <p>Thank you for you interest in name. How can we help you?</p>
      <div class="row">
        <!-- first name -->
        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="fName" class="mb-3"
                >First name <span class="text-danger">*</span></label
              >
              <input type="text" id="fName" class="input-box" placeholder="First name" />
            </form>
          </div>
        </div>

        <!-- last name -->
        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="lName" class="mb-3"
                >Last name <span class="text-danger">*</span></label
              >
              <input type="text" id="lName" class="input-box" placeholder="Last name" />
            </form>
          </div>
        </div>

        <!-- email -->
        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="email" class="mb-3"
                >Email <span class="text-danger">*</span></label
              >
              <input
                type="email"
                id="email"
                class="input-box"
                placeholder="Email address"
              />
            </form>
          </div>
        </div>

        <!-- phone number -->
        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="phoneNum" class="mb-3"
                >Phone number <span class="text-danger">*</span></label
              >
              <input
                type="number"
                id="phoneNum"
                class="input-box"
                placeholder="phone number"
              />
            </form>
          </div>
        </div>

        <!-- company's name -->
        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="companyName" class="mb-3"
                >What's your company name? (If for auditing purpose)
                <span class="text-danger">*</span></label
              >
              <input
                type="text"
                id="companyName"
                class="input-box"
                placeholder="Company's name"
              />
            </form>
          </div>
        </div>

        <!-- location -->
        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="location" class="mb-3"
                >Location <span class="text-danger">*</span></label
              >
              <input
                type="text"
                id="location"
                class="input-box"
                placeholder="Your location"
              />
            </form>
          </div>
        </div>

        <!-- message section -->
        <div class="col-lg-12 col-md-12 col-sm-12">
          <div class="py-3 pe-5">
            <form class="d-flex flex-column">
              <label for="message" class="mb-4">Do you want to leave us a message</label>
            </form>
            <textarea
              name="message"
              id="message"
              placeholder="Your message"
              class="w-100 input-box"
            ></textarea>
          </div>
        </div>

        <div class="d-flex justify-content-center align-items-center">
          <button class="submit-btn mb-5">Submit</button>
        </div>
      </div>
    </div>

    <!-- calender -->
    <div>
      <div id="calendar"></div>
    </div>

    <!-- calender script -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="../Scripts/contact.js"></script>
  </body>
</html>
